<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>移工案件區塊化追蹤系統 - 全功能進化版</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #F4F7F6;
            --card-bg: #FFFFFF;
            --border-radius: 8px;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            padding: 20px;
            color: #333;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .add-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 16px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .case-block {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary-color);
        }
        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .block-title {
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .block-title:hover {
            color: var(--primary-color);
        }
        .status-badge {
            font-size: 12px;
            background-color: #e2e8f0;
            padding: 4px 8px;
            border-radius: 12px;
            color: #475569;
        }
        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #ef4444;
            font-size: 16px;
            margin-left: 10px;
        }
        .sub-task {
            background-color: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 4px solid #F5A623;
        }
        .sub-task.transfer-in { border-left-color: #7ED321; } /* 承接用綠色 */
        .sub-task.transfer-out { border-left-color: #D0021B; } /* 轉出用紅色 */
        
        .task-detail {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .editable-text {
            cursor: pointer;
        }
        .editable-text:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>📑 移工複雜案件追蹤看板 (全功能版)</h2>
        <button class="add-btn" id="addBlockBtn">+ 新增測試區塊</button>
    </div>

    <div class="board" id="boardContainer">
        <p style="color: #888;">正在連線至 Firebase 載入資料...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 您的 Firebase 金鑰 (已確認可成功連線)
        const firebaseConfig = {
            apiKey: "AIzaSyBds2Qlh-ySODs716sNWSxbfK1smg5b-VI",
            authDomain: "adamtracking-832c3.firebaseapp.com",
            projectId: "adamtracking-832c3",
            storageBucket: "adamtracking-832c3.firebasestorage.app",
            messagingSenderId: "944450999714",
            appId: "1:944450999714:web:f25545cd4c36b3b6f5cefb",
            measurementId: "G-TETKPD01G2",
            databaseURL: "https://adamtracking-832c3-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const blocksRef = ref(db, 'caseBlocks');

        // 1. 監聽資料庫變化，自動渲染畫面
        onValue(blocksRef, (snapshot) => {
            const container = document.getElementById('boardContainer');
            container.innerHTML = ''; 
            
            const data = snapshot.val();
            if(data) {
                Object.keys(data).forEach(blockId => {
                    renderBlock(blockId, data[blockId]);
                });
            } else {
                container.innerHTML = '<p style="color: #888;">目前沒有任何案件區塊，請點擊右上方新增。</p>';
            }
        });

        // 2. 渲染單一區塊的函數
        function renderBlock(blockId, blockData) {
            const container = document.getElementById('boardContainer');
            const blockEl = document.createElement('div');
            blockEl.className = 'case-block';
            
            let subTasksHtml = '';
            if(blockData.subTasks) {
                Object.keys(blockData.subTasks).forEach(taskId => {
                    const task = blockData.subTasks[taskId];
                    let taskClass = task.type === '承接' ? 'transfer-in' : (task.type === '轉出' ? 'transfer-out' : '');
                    
                    // 將各欄位綁定 updateField 函數
                    subTasksHtml += `
                        <div class="sub-task ${taskClass}">
                            <div class="task-detail">
                                <strong class="editable-text" onclick="updateField('/caseBlocks/${blockId}/subTasks/${taskId}/employerName', '${task.employerName}', '請輸入新的【雇主】姓名：')">
                                    ${task.type}：${task.employerName} ✏️
                                </strong>
                                <span class="editable-text" onclick="updateField('/caseBlocks/${blockId}/subTasks/${taskId}/workerName', '${task.workerName}', '請輸入新的【移工】姓名：')">
                                    移工：${task.workerName} ✏️
                                </span>
                            </div>
                            <div class="task-detail">
                                <span>目前進度：</span>
                                <span class="editable-text" style="color: #0284c7; font-weight: bold;" onclick="updateField('/caseBlocks/${blockId}/subTasks/${taskId}/progress', '${task.progress}', '請輸入新的【進度狀態】：')">
                                    ${task.progress} ✏️
                                </span>
                            </div>
                        </div>
                    `;
                });
            }

            // 在標題右側加入狀態徽章與刪除垃圾桶
            blockEl.innerHTML = `
                <div class="block-header">
                    <div class="block-title editable-text" onclick="updateField('/caseBlocks/${blockId}/blockTitle', '${blockData.blockTitle}', '請輸入新的【區塊標題】：')">
                        ${blockData.blockTitle} ✏️
                    </div>
                    <div>
                        <span class="status-badge">${blockData.mainStatus}</span>
                        <button class="delete-btn" onclick="deleteBlock('${blockId}')" title="刪除此區塊">🗑️</button>
                    </div>
                </div>
                ${subTasksHtml}
            `;
            container.appendChild(blockEl);
        }

        // 3. 通用的更新資料庫函數 (標題、姓名、進度都共用這支)
        window.updateField = function(path, currentValue, promptMsg) {
            const newValue = prompt(promptMsg, currentValue);
            // 只有在使用者有輸入，且內容有改變時才更新資料庫
            if(newValue !== null && newValue.trim() !== "" && newValue !== currentValue) {
                const updates = {};
                updates[path] = newValue.trim();
                update(ref(db), updates)
                    .catch((error) => alert("更新失敗：" + error));
            }
        };

        // 4. 刪除整個區塊的函數
        window.deleteBlock = function(blockId) {
            if(confirm("⚠️ 確定要刪除整個案件區塊嗎？刪除後將無法復原。")) {
                remove(ref(db, 'caseBlocks/' + blockId))
                    .catch((error) => alert("刪除失敗：" + error));
            }
        };

        // 5. 新增一筆測試區塊寫入資料庫
        document.getElementById('addBlockBtn').addEventListener('click', () => {
            const newBlockRef = push(blocksRef);
            set(newBlockRef, {
                blockTitle: "新轉換承接專案 (點擊標題修改)",
                mainStatus: "處理中",
                subTasks: {
                    t1: { type: "轉出", employerName: "點此修改雇主", workerName: "點此修改移工", progress: "點此修改進度" },
                    t2: { type: "承接", employerName: "點此修改雇主", workerName: "點此修改移工", progress: "等待接續通報" }
                }
            }).catch((error) => {
                alert("新增失敗：" + error);
            });
        });
    </script>
</body>
</html>
