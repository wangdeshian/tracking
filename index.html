<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>預計承接轉換紀錄</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #F4F7F6;
            --card-bg: #FFFFFF;
            --border-radius: 8px;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            padding: 20px;
            margin: 0;
            color: #333;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h2 { margin: 0; }
        .add-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .case-block {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary-color);
        }
        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .block-title {
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            padding: 4px 0; /* 增加手指點擊範圍 */
        }
        
        .status-badge {
            font-size: 13px;
            padding: 6px 10px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid transparent;
            display: inline-block;
        }
        .status-prepare { background-color: #dcfce7; color: #166534; border-color: #86efac; } 
        .status-process { background-color: #e0f2fe; color: #0369a1; border-color: #7dd3fc; } 
        .status-stuck { background-color: #ffedd5; color: #c2410c; border-color: #fdba74; }   
        .status-urgent { background-color: #fee2e2; color: #b91c1c; border-color: #fca5a5; }  
        .status-closed { background-color: #f1f5f9; color: #475569; border-color: #cbd5e1; }  

        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #ef4444;
            font-size: 18px;
            margin-left: 10px;
            padding: 5px; /* 增加手指點擊範圍 */
        }
        .sub-task {
            background-color: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 4px solid #F5A623;
        }
        .sub-task.transfer-in { border-left-color: #7ED321; } 
        .sub-task.transfer-out { border-left-color: #D0021B; } 
        
        .task-detail {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .editable-text { 
            cursor: pointer; 
            padding: 4px 0; /* 手機端點擊更友善 */
        }
        .editable-text:hover { color: var(--primary-color); text-decoration: underline; }

        .progress-box {
            background-color: #e0f2fe;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
            line-height: 1.6;
            cursor: pointer;
            border: 1px dashed #7dd3fc;
        }
        .progress-hint {
            font-size: 13px;
            color: #0284c7;
            margin-bottom: 6px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        /* 彈跳視窗 (Modal) 樣式 */
        dialog {
            border: none;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
        }
        dialog::backdrop { background-color: rgba(0,0,0,0.6); }
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        /* 關鍵：字體設定 16px 避免 iOS Safari 自動放大 */
        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px; 
            background-color: #fff;
        }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .btn-cancel { background: #f1f5f9; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold;}
        .btn-save { background: var(--primary-color); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold;}

        /* 手機版專屬排版 (螢幕寬度小於 600px 時自動觸發) */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .header { 
                flex-direction: column; 
                align-items: stretch; 
                gap: 15px; 
            }
            h2 { font-size: 22px; text-align: center; }
            .add-btn { width: 100%; padding: 15px; font-size: 18px; }
            .board { grid-template-columns: 1fr; /* 強制單欄排列 */ }
            .task-detail { 
                flex-direction: column; /* 將雇主跟移工拆成上下行，更好按 */
                align-items: flex-start;
                gap: 5px;
            }
            .block-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .block-header > div {
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>📑 預計承接轉換紀錄</h2>
        <button class="add-btn" id="addBlockBtn">+ 新增案件</button>
    </div>

    <div class="board" id="boardContainer">
        <p style="color: #888;">正在連線至 Firebase 載入資料...</p>
    </div>

    <dialog id="statusModal">
        <div class="modal-title">切換案件整體狀態</div>
        <select id="statusSelect">
            <option value="🟢 準備中">🟢 準備中 (確認意願/收集資料)</option>
            <option value="🔵 處理中">🔵 處理中 (文件送出/跑流程)</option>
            <option value="🟠 卡關待補件">🟠 卡關/待補件 (文件缺失/雇主資格)</option>
            <option value="🔴 急件處理">🔴 急件處理 (期限將至優先盯)</option>
            <option value="⚫ 已結案">⚫ 已結案 (流程與居留證辦妥)</option>
        </select>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="document.getElementById('statusModal').close()">取消</button
