<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>移工案件區塊化追蹤系統 - 雲端連線版</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #F4F7F6;
            --card-bg: #FFFFFF;
            --border-radius: 8px;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            padding: 20px;
            color: #333;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .add-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 16px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .case-block {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary-color);
        }
        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .block-title {
            font-size: 18px;
            font-weight: bold;
        }
        .status-badge {
            font-size: 12px;
            background-color: #e2e8f0;
            padding: 4px 8px;
            border-radius: 12px;
            color: #475569;
        }
        .sub-task {
            background-color: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 4px solid #F5A623;
        }
        .sub-task.transfer-in { border-left-color: #7ED321; } /* 承接用綠色 */
        .sub-task.transfer-out { border-left-color: #D0021B; } /* 轉出用紅色 */
        
        .task-detail {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .edit-btn {
            background: none;
            border: 1px solid #ccc;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>📑 移工複雜案件追蹤看板 (即時同步)</h2>
        <button class="add-btn" id="addBlockBtn">+ 新增測試區塊</button>
    </div>

    <div class="board" id="boardContainer">
        <p style="color: #888;">正在連線至 Firebase 載入資料...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 整合您完整且正確的 Firebase 金鑰 (已更新為新加坡機房網址)
        const firebaseConfig = {
            apiKey: "AIzaSyBds2Qlh-ySODs716sNWSxbfK1smg5b-VI",
            authDomain: "adamtracking-832c3.firebaseapp.com",
            projectId: "adamtracking-832c3",
            storageBucket: "adamtracking-832c3.firebasestorage.app",
            messagingSenderId: "944450999714",
            appId: "1:944450999714:web:f25545cd4c36b3b6f5cefb",
            measurementId: "G-TETKPD01G2",
            databaseURL: "https://adamtracking-832c3-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const blocksRef = ref(db, 'caseBlocks');

        // 1. 監聽資料庫變化，自動渲染畫面
        onValue(blocksRef, (snapshot) => {
            const container = document.getElementById('boardContainer');
            container.innerHTML = ''; 
            
            const data = snapshot.val();
            if(data) {
                Object.keys(data).forEach(blockId => {
                    renderBlock(blockId, data[blockId]);
                });
            } else {
                container.innerHTML = '<p style="color: #888;">目前沒有任何案件區塊，請點擊右上方新增。</p>';
            }
        });

        // 2. 渲染單一區塊的函數
        function renderBlock(blockId, blockData) {
            const container = document.getElementById('boardContainer');
            const blockEl = document.createElement('div');
            blockEl.className = 'case-block';
            
            let subTasksHtml = '';
            if(blockData.subTasks) {
                Object.keys(blockData.subTasks).forEach(taskId => {
                    const task = blockData.subTasks[taskId];
                    let taskClass = task.type === '承接' ? 'transfer-in' : (task.type === '轉出' ? 'transfer-out' : '');
                    
                    subTasksHtml += `
                        <div class="sub-task ${taskClass}">
                            <div class="task-detail">
                                <strong>${task.type}：${task.employerName}</strong>
                                <span>移工：${task.workerName}</span>
                            </div>
                            <div class="task-detail">
                                <span>目前進度：</span>
                                <span style="color: #0284c7; font-weight: bold; cursor:pointer;" onclick="updateProgress('${blockId}', '${taskId}', '${task.progress}')">
                                    ${task.progress} ✏️
                                </span>
                            </div>
                        </div>
                    `;
                });
            }

            blockEl.innerHTML = `
                <div class="block-header">
                    <div class="block-title">${blockData.blockTitle}</div>
                    <span class="status-badge">${blockData.mainStatus}</span>
                </div>
                ${subTasksHtml}
            `;
            container.appendChild(blockEl);
        }

        // 3. 點擊進度文字時，修改特定子任務的進度
        window.updateProgress = function(blockId, taskId, currentProgress) {
            const newProgress = prompt("請輸入新的進度狀態：\n(例如：勞動部核發接續聘僱許可函)", currentProgress);
            if(newProgress && newProgress !== currentProgress) {
                const updates = {};
                updates['/caseBlocks/' + blockId + '/subTasks/' + taskId + '/progress'] = newProgress;
                update(ref(db), updates)
                    .then(() => console.log("進度已更新！"))
                    .catch((error) => alert("更新失敗：" + error));
            }
        };

        // 4. 新增一筆測試區塊寫入資料庫
        document.getElementById('addBlockBtn').addEventListener('click', () => {
            const newBlockRef = push(blocksRef);
            set(newBlockRef, {
                blockTitle: "新轉換承接專案 (測試)",
                mainStatus: "處理中",
                subTasks: {
                    t1: { type: "轉出", employerName: "王原雇主", workerName: "阿蒂", progress: "勞工局發函中" },
                    t2: { type: "承接", employerName: "李新雇主", workerName: "阿蒂", progress: "等待接續通報" }
                }
            }).then(() => {
                console.log("新增測試區塊成功！");
            }).catch((error) => {
                alert("寫入失敗，請確認 Firebase 規則(Rules)是否已設定為 true。錯誤訊息：" + error);
            });
        });
    </script>
</body>
</html>
